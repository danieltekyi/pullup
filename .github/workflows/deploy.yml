name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev, prod]
        required: true
        default: dev
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'infra/**'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build shared + backend
        run: |
          npm run shared:build
          npm run backend:build

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: CDK deploy (data + auth + api)
        working-directory: infra/cdk
        run: |
          npm ci
          npm run build
          npx cdk deploy pullup-${{ github.event.inputs.environment || 'dev' }}-data pullup-${{ github.event.inputs.environment || 'dev' }}-auth pullup-${{ github.event.inputs.environment || 'dev' }}-api --require-approval never --context env=${{ github.event.inputs.environment || 'dev' }}

      - name: Build frontend
        run: npm run frontend:build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_COGNITO_REGION: ${{ secrets.AWS_REGION }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_APP_CLIENT_ID: ${{ secrets.VITE_COGNITO_APP_CLIENT_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: CDK deploy (web)
        working-directory: infra/cdk
        run: |
          npx cdk deploy pullup-${{ github.event.inputs.environment || 'dev' }}-web --require-approval never --context env=${{ github.event.inputs.environment || 'dev' }}

      - name: Upload frontend to S3
        run: |
          aws s3 sync apps/frontend/dist s3://${{ secrets.WEB_BUCKET }} --delete \
            --cache-control "max-age=31536000,public,immutable" \
            --exclude "index.html" --exclude "sw.js" --exclude "manifest.webmanifest"
          aws s3 cp apps/frontend/dist/index.html s3://${{ secrets.WEB_BUCKET }}/index.html --cache-control "no-cache"
          if [ -f apps/frontend/dist/sw.js ]; then
            aws s3 cp apps/frontend/dist/sw.js s3://${{ secrets.WEB_BUCKET }}/sw.js --cache-control "no-cache"
          fi
          if [ -f apps/frontend/dist/manifest.webmanifest ]; then
            aws s3 cp apps/frontend/dist/manifest.webmanifest s3://${{ secrets.WEB_BUCKET }}/manifest.webmanifest --cache-control "no-cache"
          fi

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.DISTRIBUTION_ID }} --paths "/*"
