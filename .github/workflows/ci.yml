name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run shared:build

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build API (typecheck only — no bundle)
        working-directory: apps/api
        run: npx tsc --noEmit

      - name: Build frontend (admin)
        working-directory: apps/frontend
        env:
          VITE_APP_MODE: admin
          VITE_API_URL: https://example.test
        run: npx vite build