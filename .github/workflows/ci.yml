name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run shared:build

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build backend
        run: npm run backend:build

      - name: Build frontend
        run: npm run frontend:build
        env:
          VITE_API_URL: https://example.test
          VITE_COGNITO_REGION: us-east-1
          VITE_COGNITO_USER_POOL_ID: placeholder
          VITE_COGNITO_APP_CLIENT_ID: placeholder
