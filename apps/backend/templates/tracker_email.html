<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Track your PullUp delivery</title>
  </head>
  <body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; margin: 0; padding: 40px 20px;">
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="max-width: 560px; margin: 0 auto; background: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);">
      <tr>
        <td style="padding: 40px 40px 20px 40px; text-align: center;">
          {{logoUrl}}
          <h1 style="margin: 0 0 8px 0; font-size: 22px; color: #1e293b;">Your delivery is on the way</h1>
          <p style="margin: 0 0 24px 0; color: #64748b; font-size: 15px;">
            Hi {{customerName}}, we're on the road with order <strong>{{orderId}}</strong>.
          </p>
          <a href="{{trackingUrl}}" style="display: inline-block; padding: 14px 32px; background: #4f46e5; color: #ffffff; text-decoration: none; font-weight: 600; border-radius: 10px; font-size: 15px;">
            Track my order
          </a>
        </td>
      </tr>
      <tr>
        <td style="padding: 20px 40px 40px 40px; text-align: center; color: #94a3b8; font-size: 12px;">
          Powered by PullUp Delivery Management
        </td>
      </tr>
    </table>
  </body>
</html>
