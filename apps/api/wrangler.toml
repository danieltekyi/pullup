name = "pullup-api"
main = "src/index.ts"
compatibility_date = "2024-08-01"
compatibility_flags = ["nodejs_compat"]

# Bindings and routing
# --------------------------------------------------------------------
# The Worker serves the API at api.aegisassetllc.com (direct access) AND
# under /api/* on each frontend subdomain — same-origin so Cloudflare Access
# cookies flow naturally. Pages serves everything else on the frontend subdomains.

[[routes]]
pattern = "api.aegisassetllc.com"
custom_domain = true

[[routes]]
pattern = "pullup.aegisassetllc.com/api/*"
zone_name = "aegisassetllc.com"

[[routes]]
pattern = "pulluprider.aegisassetllc.com/api/*"
zone_name = "aegisassetllc.com"

[[routes]]
pattern = "pullupcustomer.aegisassetllc.com/api/*"
zone_name = "aegisassetllc.com"

# --------------------------------------------------------------------
# Bindings (fill IDs after `wrangler d1 create` / `wrangler r2 bucket create`)
# --------------------------------------------------------------------

[[d1_databases]]
binding = "DB"
database_name = "pullup"
database_id = "f885914c-8932-4b17-9ddc-58a2f8f85fac"
migrations_dir = "src/db/migrations"

# R2 bucket for proof-of-delivery images (signatures, photos).
[[r2_buckets]]
binding = "PROOF_BUCKET"
bucket_name = "pullup-proof"

[[kv_namespaces]]
binding = "KV"
id = "dc4829795aff4c8fb8bdc7413b78e1c1"

# Poll active partner endpoints every 5 minutes (see scheduledPartnerFetch)
[triggers]
crons = ["*/5 * * * *"]

# --------------------------------------------------------------------
# Variables (safe to commit)
# --------------------------------------------------------------------

[vars]
FRONTEND_ADMIN_URL    = "https://pullup.aegisassetllc.com"
FRONTEND_RIDER_URL    = "https://pulluprider.aegisassetllc.com"
FRONTEND_CUSTOMER_URL = "https://pullupcustomer.aegisassetllc.com"
ALLOWED_ORIGINS       = "https://pullup.aegisassetllc.com,https://pulluprider.aegisassetllc.com,https://pullupcustomer.aegisassetllc.com"
CF_ACCESS_TEAM_DOMAIN = "aegis-dashboard.cloudflareaccess.com"
# Three AUDs (comma-separated), one per Access application — token can carry any.
CF_ACCESS_AUD         = "224159b5912326257bc0ee012f7727193e3708631f3e70632fc406c646b90111,b58f3ac228de8f6b297ff74c51a442d6402c8163ef9afebc45f08abf77fa1a81,edaa3f63b88305167a606332d1d01a99266748b6d544e02db344d04e5cbadd40"
CF_ACCOUNT_ID         = "e1ae61e9ae55a87ae70b9920e8c54aa5"
CF_ACCESS_RIDERS_GROUP_ID = "7d0335f7-4422-4bc5-a05d-633271f4477e"

# --------------------------------------------------------------------
# Secrets (do NOT commit — set with `wrangler secret put NAME`)
# --------------------------------------------------------------------
# TRACKER_LINK_SECRET       — 64+ chars for tracker JWT signing
# FROM_EMAIL                — sender email (optional)
# AT_USERNAME, AT_API_KEY   — Africa's Talking SMS
# TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_WHATSAPP_FROM
# VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY, VAPID_SUBJECT
# GOOGLE_MAPS_API_KEY
# TRACKER_API_URL, TRACKER_API_KEY
